name: Release a new VTD app version

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: deb
          - os: windows-latest
            bundle: nsis

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libavformat-dev libavcodec-dev libavutil-dev \
            libswscale-dev libavfilter-dev libswresample-dev \
            libavdevice-dev

      - name: Install FFMPEG dev libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpegVersion = "8.1.2"
          $temp = "$env:RUNNER_TEMP"
          $ffmpegDir = "$temp\ffmpeg"

          # Download shared build (includes DLLs, headers, and .lib)
          $sharedUrl = "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-${ffmpegVersion}-full_build-shared.7z"
          Write-Host "Downloading FFMPEG shared build..."
          Invoke-WebRequest -Uri $sharedUrl -OutFile "$temp\ffmpeg-shared.7z"
          7z x "$temp\ffmpeg-shared.7z" -o"$ffmpegDir" -y | Out-Null

          $shared = Get-ChildItem "$ffmpegDir" -Directory | Where-Object Name -like "*shared*" | Select-Object -First 1

          # Copy DLLs to bundle resources
          Copy-Item "$($shared.FullName)\bin\*.dll" -Destination "src-tauri\resources\" -Force

          # Set FFMPEG_DIR so ffmpeg-sys-next finds it (shared build includes include/ + lib/)
          "FFMPEG_DIR=$($shared.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install npm dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build Tauri application
        run: npx tauri build --bundles ${{ matrix.bundle }}

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/${{ matrix.bundle }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
